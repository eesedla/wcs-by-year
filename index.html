<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Body Camera Violations by Year – CPD</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: transparent;
  font-family: 'Roboto Condensed', 'Arial Narrow', sans-serif;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 32px 16px;
}

.viz-container {
  width: 100%;
  max-width: 900px;
  background: transparent;
  overflow: hidden;
}

.viz-container::before {
  content: '';
  display: block;
  height: 4px;
  background: #F4C913;
  width: 100%;
}

/* Viz header */
.viz-header {
  padding: 20px 20px 16px;
}

.viz-kicker {
  font-family: 'Gotham', 'Gotham Medium', sans-serif;
  font-weight: 500;
  font-size: 12px;
  color: #404F54;
  opacity: 0.65;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 4px;
}

.viz-heading {
  font-family: 'Roboto Condensed', 'Arial Narrow', sans-serif;
  font-size: 22px;
  font-weight: 700;
  color: #404F54;
  line-height: 1.3;
  margin-bottom: 4px;
}

.viz-subheading {
  font-family: 'Inter', Arial, sans-serif;
  font-size: 14px;
  font-weight: 500;
  color: #404F54;
  opacity: 0.72;
  line-height: 1.5;
}

/* Toggle bar */
.toggle-bar {
  padding: 10px 20px;
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
  background: transparent;
}

.toggle-label {
  font-size: 0.75rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: #404F54;
  margin-right: 4px;
  white-space: nowrap;
}

.toggle-btn {
  font-family: 'Roboto Condensed', sans-serif;
  font-size: 0.85rem;
  font-weight: 500;
  padding: 6px 14px;
  border-radius: 2px;
  border: 1px solid #ccd8db;
  background: #fff;
  cursor: pointer;
  transition: border-color 0.18s, background 0.18s;
  color: #23685b;
  white-space: nowrap;
}

.toggle-btn:hover { background: transparent; border-color: #23685b; }
.toggle-btn.active { color: #fff; border-color: transparent; background: #23685b; }

/* Chart header with back button */
.chart-header {
  padding: 10px 20px 0;
  height: 45px;
  display: flex;
  align-items: center;
  gap: 10px;
  opacity: 0;
  transition: opacity 0.15s;
}
.chart-header.visible { opacity: 1; }

.back-btn {
  font-family: 'Roboto Condensed', 'Arial Narrow', sans-serif;
  font-size: 0.72rem;
  font-weight: 600;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  color: #404F54;
  background: #ffffff;
  border: 1px solid #404F54;
  padding: 5px 12px;
  cursor: pointer;
  transition: all 0.15s;
  display: none;
}

.chart-header-text {
  display: flex;
  flex-direction: column;
  gap: 1px;
}

.chart-title {
  font-family: 'Roboto Condensed', 'Arial Narrow', sans-serif;
  font-weight: 700;
  font-size: 0.96rem;
  color: #404F54;
}

.chart-subtitle {
  font-family: 'Roboto Condensed', 'Arial Narrow', sans-serif;
  font-size: 0.8rem;
  font-weight: 400;
  color: #404F54;
  opacity: 0.55;
}

/* Chart area */
.chart-area { padding: 18px 14px 6px; position: relative; }
#chart { width: 100%; height: auto; display: block; overflow: visible; }
.col-group { cursor: default; }
.seg { transition: opacity 0.15s ease; }
.seg.dim { opacity: 0.06; }
.axis-text {
  font-family: 'Inter', sans-serif; fill: #404F54; font-size: 12px;
}
.axis-text.partial { opacity: 0.6; }
.ytick { fill: #404F54; opacity: 0.5; font-size: 11px; font-family: 'Inter', sans-serif; }
.gridline { stroke: #404F54; stroke-opacity: 0.12; stroke-width: 1; }
.col-total {
  font-family: 'Inter', sans-serif; font-weight: 700;
  fill: #404F54; font-size: 12px;
}

/* Bar rows (div-based horizontal bars) */
.bar-row { margin-bottom: 6px; cursor: default; }
.bar-row.clickable { cursor: pointer; }
.bar-row.clickable:hover .bar-track { box-shadow: 0 1px 6px rgba(0,0,0,0.1); }

.bar-row-label {
  font-family: 'Roboto Condensed', 'Arial Narrow', sans-serif;
  font-size: 0.82rem;
  font-weight: 600;
  color: #404F54;
  margin-bottom: 3px;
  display: flex;
  align-items: baseline;
  gap: 8px;
}

.bar-row-label .count-label {
  font-family: 'Inter', Arial, sans-serif;
  font-weight: 400;
  font-size: 0.72rem;
  color: #404F54;
  opacity: 0.6;
}

.bar-track {
  position: relative;
  height: 28px;
  background: rgba(64,79,84,0.06);
  border-radius: 2px;
  overflow: hidden;
}

.bar-fill {
  position: absolute;
  top: 0; left: 0;
  height: 100%;
  border-radius: 2px;
  transition: width 0.45s cubic-bezier(0.25, 0.46, 0.45, 0.94), opacity 0.2s ease;
}

.bar-row:hover .bar-fill { opacity: 0.95; }

.bar-pct {
  position: absolute;
  right: 8px;
  top: 50%;
  transform: translateY(-50%);
  font-family: 'Inter', Arial, sans-serif;
  font-size: 0.72rem;
  font-weight: 600;
  color: #fff;
  pointer-events: none;
  text-shadow: 0 1px 2px rgba(0,0,0,0.2);
}

.bar-pct.outside {
  color: #404F54;
  text-shadow: none;
  right: auto;
  left: calc(var(--bar-width) + 8px);
}

.bar-segment {
  position: absolute;
  top: 0;
  height: 100%;
  transition: opacity 0.15s;
}
.bar-segment:hover { opacity: 0.92; }

/* Tooltip */
.bar-tooltip {
  position: fixed;
  pointer-events: none;
  background: #404F54;
  color: #fff;
  font-family: 'Inter', Arial, sans-serif;
  font-size: 0.75rem;
  line-height: 1.5;
  padding: 12px 16px;
  border-radius: 2px;
  max-width: 280px;
  min-width: 180px;
  opacity: 0;
  transition: opacity 0.15s;
  z-index: 999;
  box-shadow: 0 4px 16px rgba(0,0,0,0.18);
  white-space: nowrap;
}
.bar-tooltip.visible { opacity: 1; }

.bar-tooltip .tt-title {
  font-family: 'Inter', Arial, sans-serif;
  font-weight: 700;
  font-size: 13px;
  display: block;
  margin-bottom: 2px;
}

.bar-tooltip .tt-total {
  font-family: 'Inter', Arial, sans-serif;
  font-size: 0.68rem;
  opacity: 0.55;
  display: block;
  padding-bottom: 6px;
  margin-bottom: 6px;
  border-bottom: 1px solid rgba(255,255,255,0.15);
}

.bar-tooltip .tt-row {
  display: flex;
  align-items: center;
  gap: 7px;
  margin-top: 3px;
}

.bar-tooltip .tt-bar-swatch {
  width: 9px; height: 9px;
  border-radius: 2px;
  flex-shrink: 0;
}

.bar-tooltip .tt-label { flex: 1; font-size: 0.72rem; }
.bar-tooltip .tt-count { font-size: 0.72rem; font-weight: 600; }

/* Legend */
.legend {
  padding: 4px 20px 16px;
  display: flex;
  flex-wrap: wrap;
  gap: 5px 6px;
}

.legend-chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-family: 'Roboto Condensed', 'Arial Narrow', sans-serif;
  font-size: 0.85rem;
  font-weight: 500;
  color: #404F54;
  padding: 6px 14px;
  border: 1px solid #ccd8db;
  border-radius: 2px;
  background: #fff;
  cursor: pointer;
  transition: all 0.12s;
  line-height: 1;
}

.legend-chip:hover { border-color: #23685b; }

.legend-chip .lg-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
  opacity: 0.85;
}

.legend-chip .lg-count {
  font-family: 'Inter', sans-serif;
  font-size: 0.7rem;
  opacity: 0.55;
  font-weight: 500;
}

.legend-chip.muted { opacity: 0.4; }
.legend-chip.solo {
  background: var(--chip-color, #404F54);
  color: #fff;
  border-color: transparent;
}
.legend-chip.solo .lg-dot { background: rgba(255,255,255,0.8) !important; }
.legend-chip.solo .lg-count { opacity: 0.85; }

/* Viz note */
.viz-note {
  font-size: 12px;
  font-family: 'Inter', Arial, sans-serif;
  font-weight: 500;
  color: #404F54;
  opacity: 0.55;
  line-height: 1.4;
  padding: 8px 15px 8px;
  background: transparent;
}
</style>
</head>
<body>

<div class="viz-container">

  <div class="viz-header">
    <div class="viz-kicker">Signal Cleveland</div>
    <div class="viz-heading">Body camera violations by year</div>
    <div class="viz-subheading">Disciplinary cases involving Wearable Camera System (WCS) violations, broken down by the type of rule the officer broke. Click a category in the legend to highlight it.</div>
  </div>

  <div class="legend" id="legend"></div>

  <div class="chart-header" id="chartHeader">
    <div class="chart-header-text">
      <span class="chart-title" id="chartTitle"></span>
      <span class="chart-subtitle" id="chartSubtitle"></span>
    </div>
  </div>

  <div class="chart-area">
    <svg id="chart" preserveAspectRatio="xMidYMid meet"
         aria-label="Stacked bar chart of body camera violations by year, 2016–2026"></svg>
  </div>



<!-- Tooltip lives outside the container so fixed positioning works cleanly -->
<div class="bar-tooltip" id="tooltip"></div>

<script>
const CATS = [
  { key: 'generic',     label: 'Unspecified',      color: '#d0d64c' },
  { key: 'activate',    label: 'Failed to activate',         color: '#23685b' },
  { key: 'maintain',    label: 'Returned to buffering',      color: '#5fa896' },
  { key: 'upload',      label: 'Failed to upload / tag',     color: '#a9d2cf' },
  { key: 'safeguard',   label: 'Lost or damaged equipment', color: '#dbe7e3' },
];

const DATA = [
  { year: 2017, total: 17, activate: 11, maintain: 1, upload: 0, safeguard: 3, generic: 3 },
  { year: 2018, total: 32, activate: 12, maintain: 0, upload: 5, safeguard: 0, generic: 16 },
  { year: 2019, total: 42, activate: 0, maintain: 1, upload: 1, safeguard: 3, generic: 38 },
  { year: 2020, total: 64, activate: 34, maintain: 19, upload: 1, safeguard: 5, generic: 14 },
  { year: 2021, total: 85, activate: 66, maintain: 7, upload: 2, safeguard: 6, generic: 8 },
  { year: 2022, total: 38, activate: 31, maintain: 0, upload: 0, safeguard: 9, generic: 6 },
  { year: 2023, total: 63, activate: 44, maintain: 3, upload: 7, safeguard: 2, generic: 12 },
  { year: 2024, total: 23, activate: 17, maintain: 4, upload: 1, safeguard: 5, generic: 2 },
  { year: 2025, total: 8, activate: 7, maintain: 2, upload: 1, safeguard: 0, generic: 0 },
];

// ── Layout constants ─────────────────────────────────────────────
const MAX_SCALE = 90;
const SVG_W    = 820;
const ML       = 32;   // left margin (y-axis labels)
const MR       = 12;   // right margin
const MT       = 20;   // top margin (above tallest bar)
const MB       = 36;   // bottom margin (year labels)
const CHART_W  = SVG_W - ML - MR;   // 776
const CHART_H  = 300;
const SVG_H    = MT + CHART_H + MB; // 356
const GROUP_W  = CHART_W / DATA.length;
const BAR_W    = Math.round(GROUP_W * 0.68);
const BAR_PAD  = (GROUP_W - BAR_W) / 2;

// ── Bar entrance animation ──────────────────────────────────────
const STAGGER_ORDER  = CATS.map(c => c.key); // bottom-to-top build order
const STAGGER_STEP   = 0;   // ms delay between each stacked layer starting
const SEG_DURATION   = 700;  // ms duration of each segment's own grow-in
const TOTAL_DURATION = STAGGER_STEP * (STAGGER_ORDER.length - 1) + SEG_DURATION + 250;
const ease = t => 1 - Math.pow(1 - t, 3);
let animGen = 0;

const NS = 'http://www.w3.org/2000/svg';
function el(tag, attrs = {}, text) {
  const node = document.createElementNS(NS, tag);
  for (const [k, v] of Object.entries(attrs)) node.setAttribute(k, v);
  if (text !== undefined) node.textContent = text;
  return node;
}

// helpers
const toPixY  = count => MT + CHART_H - (count / MAX_SCALE) * CHART_H;
const barLeft = i     => ML + i * GROUP_W + BAR_PAD;
const barMidX = i     => ML + i * GROUP_W + GROUP_W / 2;

// ── State ────────────────────────────────────────────────────────
let activeFilter = null;

const tooltip    = document.getElementById('tooltip');
const chartHdr   = document.getElementById('chartHeader');
const chartTitle = document.getElementById('chartTitle');
const chartSub   = document.getElementById('chartSubtitle');
const legendEl   = document.getElementById('legend');
const svg        = document.getElementById('chart');

svg.setAttribute('viewBox', `0 0 ${SVG_W} ${SVG_H}`);

// ── Legend (clickable filter) ────────────────────────────────────
CATS.forEach(cat => {
  const total = DATA.reduce((sum, d) => sum + (d[cat.key] || 0), 0);
  const chip = document.createElement('div');
  chip.className = 'legend-chip';
  chip.dataset.key = cat.key;
  chip.innerHTML = `<div class="lg-dot" style="background:${cat.color}"></div>${cat.label}<span class="lg-count">${total}</span>`;
  chip.style.setProperty('--chip-color', cat.color);
  chip.addEventListener('click', () => {
    activeFilter === cat.key ? clearFilter() : setFilter(cat);
  });
  legendEl.appendChild(chip);
});

function setFilter(cat) {
  activeFilter = cat.key;
  legendEl.querySelectorAll('.legend-chip').forEach(chip => {
    const isActive = chip.dataset.key === cat.key;
    chip.classList.toggle('solo', isActive);
    chip.classList.toggle('muted', !isActive);
  });
  svg.querySelectorAll('.seg').forEach(r => {
    r.classList.toggle('dim', r.dataset.cat !== cat.key);
  });
  chartHdr.classList.add('visible');
  chartTitle.textContent = cat.label;
  chartSub.textContent = 'Click again to reset';
}

function clearFilter() {
  activeFilter = null;
  legendEl.querySelectorAll('.legend-chip').forEach(chip => {
    chip.classList.remove('solo', 'muted');
  });
  svg.querySelectorAll('.seg').forEach(r => r.classList.remove('dim'));
  chartHdr.classList.remove('visible');
  chartTitle.textContent = '';
  chartSub.textContent = '';
}

// ── Y-axis gridlines + labels ─────────────────────────────────────
[0, 20, 40, 60, 80].forEach(val => {
  const y = toPixY(val);
  // gridline
  svg.appendChild(el('line', {
    x1: ML, y1: y, x2: ML + CHART_W, y2: y,
    class: 'gridline',
  }));
  // label
  svg.appendChild(el('text', {
    x: ML - 6, y: y + 4,
    'text-anchor': 'end',
    class: 'ytick',
  }, val));
});

// ── Columns ───────────────────────────────────────────────────────
DATA.forEach((d, i) => {
  const partial = false;
  const x = barLeft(i);
  const baseline = MT + CHART_H;

  const group = el('g', { class: 'col-group' });

  // Stacked segments from bottom up.
  // A case can involve more than one violation type, so category counts can
  // sum past the case total; scale segments so bar height === d.total cases.
  const ms = CATS.reduce((a, c) => a + (d[c.key] || 0), 0) || 1;
  let curY = baseline;
  CATS.forEach(cat => {
    const count = d[cat.key] || 0;
    if (count === 0) return;
    const h = ((count / ms) * d.total / MAX_SCALE) * CHART_H;
    curY -= h;

    const rect = el('rect', { x, y: curY, width: BAR_W, height: h, fill: cat.color });
    rect.classList.add('seg');
    rect.dataset.cat = cat.key;
    rect.dataset.group = cat.key;
    rect.dataset.finalY = curY;
    rect.dataset.finalHeight = h;
    group.appendChild(rect);
  });

  // Total label above the stack
  group.appendChild(el('text', {
    x: barMidX(i), y: curY - 6,
    'text-anchor': 'middle',
    class: 'col-total',
  }, d.total));

  // Year label below baseline
  group.appendChild(el('text', {
    x: barMidX(i), y: baseline + 18,
    'text-anchor': 'middle',
    class: 'axis-text' + (partial ? ' partial' : ''),
  }, d.year + (partial ? '*' : '')));

  // Invisible hover zone — full column height for consistent tooltip
  const zone = el('rect', {
    x, y: MT, width: BAR_W, height: CHART_H,
    fill: 'transparent', cursor: 'crosshair',
  });
  zone.addEventListener('mouseenter', e => showTooltip(e, d));
  zone.addEventListener('mousemove',  e => moveTooltip(e));
  zone.addEventListener('mouseleave', hideTooltip);
  group.appendChild(zone);

  svg.appendChild(group);
});

// ── Bar entrance animation ─────────────────────────────────────
function hideBars() {
  const baseline = MT + CHART_H;
  svg.querySelectorAll('.seg').forEach(rect => {
    rect.setAttribute('y', baseline);
    rect.setAttribute('height', 0);
  });
  svg.querySelectorAll('.col-total').forEach(l => l.setAttribute('opacity', '0'));
}

function animateBars() {
  const gen = ++animGen;
  const baseline = MT + CHART_H;
  const start = performance.now();

  svg.querySelectorAll('.seg').forEach(rect => {
    const finalY = parseFloat(rect.dataset.finalY);
    const finalH = parseFloat(rect.dataset.finalHeight);
    const delay  = STAGGER_ORDER.indexOf(rect.dataset.group) * STAGGER_STEP;
    rect.setAttribute('y', baseline);
    rect.setAttribute('height', 0);
    function frame(now) {
      if (gen !== animGen) return;
      const elapsed = now - start - delay;
      if (elapsed < 0) { requestAnimationFrame(frame); return; }
      const t = Math.min(elapsed / SEG_DURATION, 1);
      const e = ease(t);
      rect.setAttribute('height', Math.max(finalH * e, 0));
      rect.setAttribute('y', baseline + (finalY - baseline) * e);
      if (t < 1) requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  });

  const totals = Array.from(svg.querySelectorAll('.col-total'));
  totals.forEach(l => l.setAttribute('opacity', '0'));
  const labelStart = 0.75;
  function labelFrame(now) {
    if (gen !== animGen) return;
    const t = Math.min((now - start) / TOTAL_DURATION, 1);
    const op = Math.max(0, Math.min(1, (t - labelStart) / (1 - labelStart)));
    totals.forEach(l => l.setAttribute('opacity', op));
    if (t < 1) requestAnimationFrame(labelFrame);
  }
  requestAnimationFrame(labelFrame);
}

const xAxisSentinel = document.createElement('div');
xAxisSentinel.style.cssText = 'position:absolute;bottom:0;left:0;width:1px;height:1px;pointer-events:none;';
document.querySelector('.chart-area').appendChild(xAxisSentinel);

let chartAnimated = false;
const barObserver = new IntersectionObserver(entries => {
  if (entries[0].isIntersecting && !chartAnimated) {
    chartAnimated = true;
    animateBars();
  }
}, { threshold: 0 });

hideBars();
barObserver.observe(xAxisSentinel);

// ── Tooltip ──────────────────────────────────────────────────────
function showTooltip(e, d) {
  const catRows = CATS
    .filter(cat => (d[cat.key] || 0) > 0)
    .map(cat => `
      <div class="tt-row">
        <div class="tt-bar-swatch" style="background:${cat.color}"></div>
        <span class="tt-label">${cat.label}</span>
        <span class="tt-count">${d[cat.key]}</span>
      </div>`)
    .join('');

  tooltip.innerHTML = `
    <span class="tt-title">${d.year}</span>
    <span class="tt-total">${d.total} case${d.total !== 1 ? 's' : ''} with WCS violations</span>
    ${catRows}
  `;

  tooltip.classList.add('visible');
  moveTooltip(e);
}

function moveTooltip(e) {
  const tw = tooltip.offsetWidth  || 210;
  const th = tooltip.offsetHeight || 160;
  let left = e.clientX + 14;
  let top  = e.clientY - th / 2;

  if (left + tw > window.innerWidth  - 10) left = e.clientX - tw - 14;
  left = Math.max(10, Math.min(left, window.innerWidth  - tw - 10));

  if (top < 10)                            top  = 10;
  if (top + th > window.innerHeight  - 10) top  = window.innerHeight - th - 10;
  top = Math.max(10, top);

  tooltip.style.left = left + 'px';
  tooltip.style.top  = top  + 'px';
}

function hideTooltip() {
  tooltip.classList.remove('visible');
}
</script>
<script>
/* Auto-height embed messaging (self-contained replacement for pym.js — NPR CDN retired) */
(function () {
  function postHeight() {
    var el = document.querySelector('.viz-container');
    var h = el ? Math.ceil(el.getBoundingClientRect().bottom + 32) : document.body.scrollHeight;
    window.parent.postMessage({ type: 'embed-height', height: h }, '*');
  }
  window.addEventListener('load', postHeight);
  window.addEventListener('resize', postHeight);
  setInterval(postHeight, 500);
})();
</script>
</body>
</html>
